<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>EcoViva Naturais</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #e8f5e9, #ffffff);
  color: #1b5e20;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.3);
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.logo {
  font-size: 26px;
  font-weight: bold;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #1b5e20;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color: #43a047;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
  background: linear-gradient(135deg, #66bb6a, #a5d6a7);
  color: white;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 15px;
  animation: fadeIn 1.5s ease;
}

.hero p {
  font-size: 18px;
  margin-bottom: 25px;
}

.hero button {
  padding: 15px 30px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #2e7d32;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* PRODUTOS */
.produtos {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}

.card {
  width: 260px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.card img {
  width: 90px;
  margin-bottom: 10px;
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  margin-bottom: 15px;
}

.card button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.card button:hover {
  box-shadow: 0 0 15px #66bb6a;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #2e7d32;
  color: white;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
  <div class="logo">🌿 EcoViva</div>
  <nav>
    <a href="#">Início</a>
    <a href="produtos.html">Produtos</a>
  </nav>
</header>

<section class="hero">
  <h1>Energia Natural para sua Vida</h1>
  <p>Saúde, equilíbrio e natureza em um só lugar</p>
  <button onclick="window.location.href='produtos.html'">Explorar Produtos</button>
</section>

<section class="produtos">
  <h2>Nossos Destaques</h2>

  <div class="cards">

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/2909/2909763.png">
      <h3>Chás Naturais</h3>
      <p>Relaxamento e saúde no seu dia.</p>
      <button onclick="window.location.href='produtos.html'">Ver mais</button>
    </div>

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
      <h3>Grãos Orgânicos</h3>
      <p>Nutrição pura e natural.</p>
      <button onclick="window.location.href='produtos.html'">Ver mais</button>
    </div>

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/415/415733.png">
      <h3>Óleos Naturais</h3>
      <p>Beleza e bem-estar.</p>
      <button onclick="window.location.href='produtos.html'">Ver mais</button>
    </div>

  </div>
</section>

<footer>
  © 2026 EcoViva Naturais
</footer>

</body>
</html>
