<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>EcoViva Naturais</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#f4fff4;
  color:#1b5e20;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:white;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{font-size:24px;font-weight:700;}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#1b5e20;
  font-weight:500;
}

nav a:hover{color:#43a047;}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#66bb6a,#a5d6a7);
  color:white;
}

.hero h1{font-size:40px;margin-bottom:10px;}
.hero p{margin-bottom:20px;}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#2e7d32;
  cursor:pointer;
  font-weight:500;
}

button:hover{opacity:0.8;}

/* PRODUTOS */
.produtos{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  width:250px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3{margin-bottom:10px;}

/* CONTATO */
.contato{
  background:#e8f5e9;
  padding:50px 20px;
  text-align:center;
}

.contato p{
  margin:10px 0;
}

/* FOOTER */
footer{
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:15px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🌿 EcoViva</div>
  <nav>
    <a href="#">Início</a>
    <a href="produtos.html">Produtos</a>
  </nav>
</header>

<section class="hero">
  <h1>Vida Natural, Saúde Real</h1>
  <p>Produtos naturais para seu bem-estar</p>
  <button onclick="location.href='produtos.html'">Ver Produtos</button>
</section>

<section class="produtos">
  <h2>Destaques</h2>

  <div class="cards">
    <div class="card">
      <h3>Chás Naturais</h3>
      <p>Relaxamento e saúde</p>
    </div>

    <div class="card">
      <h3>Grãos Orgânicos</h3>
      <p>Energia e nutrição</p>
    </div>

    <div class="card">
      <h3>Óleos Naturais</h3>
      <p>Beleza e cuidado</p>
    </div>
  </div>
</section>

<section class="contato">
  <h2>Contato</h2>
  <p>📞 (48) 99999-1234</p>
  <p>📧 contato@ecoviva.com</p>
</section>

<footer>
  © 2026 EcoViva Naturais
</footer>

</body>
</html>
