<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>EcoViva Naturais</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:#eef7f0;color:#163d2b;}

header{
  display:flex;justify-content:space-between;
  padding:20px 60px;background:#1f5c3f;color:white;
}

h1,h2,h3{font-family:'Playfair Display',serif;}

.hero{
  padding:80px 60px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,#2e7d32,#66bb6a);
  color:white;
}

.hero img{width:350px;border-radius:15px;}

.cards{
  display:flex;justify-content:center;gap:30px;
  padding:60px;
}

.card{
  background:white;padding:20px;width:260px;
  border-radius:15px;cursor:pointer;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{width:100%;height:160px;object-fit:cover;border-radius:10px;}

footer{
  background:#1f5c3f;color:white;text-align:center;padding:20px;
}
</style>
</head>

<body>

<header>
  <h2>🌿 EcoViva</h2>
</header>

<section class="hero">
  <div>
    <h1>Produtos Naturais Premium</h1>
    <p>Qualidade, saúde e bem-estar direto da natureza</p>
  </div>
  <img src="https://images.unsplash.com/photo-1506806732259-39c2d0268443">
</section>

<section class="cards">

  <div class="card" onclick="location.href='chas.html'">
    <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
    <h3>Chás Naturais</h3>
  </div>

  <div class="card" onclick="location.href='graos.html'">
    <img src="https://images.unsplash.com/photo-1604908554167-4a6e2c2dff7e">
    <h3>Grãos Orgânicos</h3>
  </div>

  <div class="card" onclick="location.href='oleos.html'">
    <img src="https://images.unsplash.com/photo-1608571423539-e951b9b3871d">
    <h3>Óleos Naturais</h3>
  </div>

</section>

<footer>
📞 (48) 99999-1234 | 📧 contato@ecoviva.com
</footer>

</body>
</html>
