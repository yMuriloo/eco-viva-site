<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produtos - EcoViva</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#f4fff4;
  color:#1b5e20;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:white;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{font-size:24px;font-weight:700;}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#1b5e20;
}

/* PRODUTOS */
.container{
  padding:50px 20px;
  text-align:center;
}

.grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
}

.produto{
  background:white;
  padding:20px;
  width:260px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.produto img{
  width:90px;
  margin-bottom:10px;
}

.produto h2{margin-bottom:10px;}
.produto p{margin-bottom:10px;}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#2e7d32;
  color:white;
  cursor:pointer;
}

button:hover{background:#1b5e20;}

/* FOOTER */
footer{
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:15px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🌿 EcoViva</div>
  <nav>
    <a href="index.html">Início</a>
  </nav>

  <div class="grid">

      <h2>Chás Naturais</h2>
      <p>Ervas selecionadas para relaxamento e saúde.</p>
      <p><strong>R$ 19,90</strong></p>
      <button>Comprar</button>
    </div>

    <div class="produto">

      <p><strong>R$ 24,90</strong></p>
      <button>Comprar</button>

      <h2>Óleos Naturais</h2>
      <p>Cuidados naturais para corpo e mente.</p>
      <p><strong>R$ 29,90</strong></p>
      <button>Comprar</button>

  </div>
</div>

<footer>
  © 2026 EcoViva Naturais
</footer>
