<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produtos - EcoViva</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#f9fdf9;
  color:#1b3a2f;
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:white;
  border-bottom:1px solid #eee;
}

.logo{font-weight:700;}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#1b3a2f;
}

.container{
  padding:60px;
  text-align:center;
}

.grid{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  margin-top:30px;
}

.produto{
  background:white;
  width:280px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.produto img{
  width:100px;
  margin-bottom:10px;
}

.produto p{
  margin:10px 0;
  color:#555;
}

.preco{
  font-weight:700;
  margin:10px 0;
}

button{
  padding:10px 25px;
  border:none;
  border-radius:25px;
  background:#2e7d32;
  color:white;
  cursor:pointer;
}

button:hover{background:#1b5e20;}

footer{
  background:#1b3a2f;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🌿 EcoViva</div>
  <nav>
    <a href="index.html">Início</a>
  </nav>
</header>

<div class="container">
  <h1>Nossos Produtos</h1>

  <div class="grid">

    <div class="produto">
      <img src="https://cdn-icons-png.flaticon.com/512/415/415733.png">
      <h2>Chás Naturais</h2>
      <p>Ervas selecionadas que ajudam no relaxamento e bem-estar.</p>
      <div class="preco">R$ 19,90</div>
      <button>Comprar</button>
    </div>

    <div class="produto">
      <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
      <h2>Grãos Orgânicos</h2>
      <p>Alimentos ricos em nutrientes e energia natural.</p>
      <div class="preco">R$ 24,90</div>
      <button>Comprar</button>
    </div>

    <div class="produto">
      <img src="https://cdn-icons-png.flaticon.com/512/2909/2909763.png">
      <h2>Óleos Naturais</h2>
      <p>Óleos essenciais para cuidados com corpo e mente.</p>
      <div class="preco">R$ 29,90</div>
      <button>Comprar</button>
    </div>

  </div>
</div>

<footer>
  © 2026 EcoViva Naturais
</footer>

</body>
</html>
